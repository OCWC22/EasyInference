version: "1"
name: dynamo-disagg-prefill-nixl-grace
description: Dynamo 1.0 orchestrated disaggregated serving on Grace systems (GB200/GB300/GH200) with NIXL and Grace coherent KV overflow.
engine: dynamo
workload: long-context-kv-offload-rag
benchmark_role: topology_probe
target_gpu_families: [hopper_grace, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [dense_gqa, qwen35_hybrid, frontier_mla_moe]
focus_areas: [grace_overflow, disaggregation, kv_transfer, rdma, long_context, dynamo]
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: NixlConnector
  notes:
    - "Grace LPDDR5X provides 480GB coherent overflow at ~500 GB/s via NVLink-C2C (~7x PCIe)"
    - "Dynamo KV Block Manager orchestrates HBM -> Grace -> eviction tiering"
    - "NIXL handles inter-node KV transfer over RDMA while Grace handles intra-node overflow"
cache:
  strategy: nixl
  tiers: [gpu_hbm, grace_coherent]
  connector: NixlConnector
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - "Grace coherent tier absorbs KV overflow before cross-node transfer is needed"
    - "Expected to reduce preemptions 3-5x compared to HBM-only tiering at 128K contexts"
    - "FP8 KV cache further extends effective capacity on both HBM and Grace tiers"
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: router
    role: router
    endpoint_source: named_override
    override_key: router
    expected_engine: dynamo
    required: false
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [dynamo, disagg, nixl, rdma, grace, long-context, production]
