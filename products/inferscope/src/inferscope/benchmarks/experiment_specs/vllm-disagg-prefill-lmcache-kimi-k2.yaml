version: "1"
name: vllm-disagg-prefill-lmcache-kimi-k2
description: vLLM prefill/decode split with LMCache for Kimi K2 (1T MoE, MLA attention). Requires minimum 4 GPUs for TP.
engine: vllm
workload: production-disagg-coding
model: Kimi-K2
benchmark_role: topology_probe
target_gpu_families: [hopper, blackwell, blackwell_ultra, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [frontier_mla_moe]
focus_areas: [disaggregation, lmcache, mla_attention, long_context, moe]
concurrency: 2
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: LMCacheConnectorV1
  notes:
    - "Kimi K2 uses MLA attention — KV cache is compressed via latent projection"
    - "MLA latent dim means KV transfer size is ~4x smaller than standard GQA at equivalent heads"
    - "LMCache handles disaggregated KV reuse between prefill and decode workers"
cache:
  strategy: lmcache
  tiers: [gpu_hbm, cpu_dram, remote_cache]
  connector: LMCache
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - "FP8 KV cache strongly recommended to fit 1T MoE model with adequate KV budget"
    - "Expert parallelism may be needed alongside TP for models >384 experts"
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [vllm, disagg, lmcache, kimi, mla, moe, production]
