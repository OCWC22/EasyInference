version: "1"
name: vllm-disagg-prefill-lmcache
description: vLLM prefill/decode split benchmark with LMCache-style remote KV reuse.
engine: vllm
workload: coding-long-context
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
cache:
  strategy: lmcache
  tiers: [gpu_hbm, cpu_dram, remote_cache]
  connector: LMCache
  session_affinity: true
  prefix_cache_expected: true
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [vllm, disagg, lmcache]
