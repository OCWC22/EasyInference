version: "1"
name: vllm-disagg-prefill-lmcache-glm5
description: vLLM prefill/decode split with LMCache for GLM-5 (400B MoE). Tests MTP speculative decoding under disaggregated serving.
engine: vllm
workload: production-disagg-coding
model: GLM-5
benchmark_role: topology_probe
target_gpu_families: [hopper, blackwell, blackwell_ultra, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [frontier_mla_moe]
focus_areas: [disaggregation, lmcache, moe, mtp_speculative]
concurrency: 2
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: LMCacheConnectorV1
  notes:
    - "GLM-5 uses MTP speculative decoding for faster token generation"
    - "LMCache handles disaggregated KV reuse between prefill and decode workers"
    - "Expert parallelism recommended for 192-expert model across 4+ GPUs"
cache:
  strategy: lmcache
  tiers: [gpu_hbm, cpu_dram, remote_cache]
  connector: LMCache
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - "FP8 KV cache recommended to fit 400B MoE with adequate KV budget"
    - "MTP speculation may increase KV cache pressure — monitor preemption rate"
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [vllm, disagg, lmcache, glm, moe, production]
