version: "1"
name: dynamo-disagg-prefill-nixl-glm5
description: Dynamo 1.0 orchestrated prefill/decode split for GLM-5 (400B MoE) with NIXL KV transfer and SLO-driven autoscaling.
engine: dynamo
workload: production-disagg-coding
model: GLM-5
benchmark_role: topology_probe
target_gpu_families: [hopper, blackwell, blackwell_ultra, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [frontier_mla_moe]
focus_areas: [disaggregation, kv_transfer, rdma, dynamo, moe]
concurrency: 2
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: NixlConnector
  notes:
    - "GLM-5 uses MTP speculative decoding — Dynamo SLO Planner accounts for speculation overhead"
    - "NIXL handles zero-copy KV transfer between prefill and decode pools"
    - "Smart Router uses KV-aware scheduling to minimize cross-pool transfer"
cache:
  strategy: nixl
  tiers: [gpu_hbm]
  connector: NixlConnector
  session_affinity: true
  prefix_cache_expected: true
  notes:
    - "FP8 KV cache recommended to double effective sequence capacity"
    - "Expert parallelism recommended for 192-expert model across 4+ GPUs"
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: router
    role: router
    endpoint_source: named_override
    override_key: router
    expected_engine: dynamo
    required: false
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [dynamo, disagg, nixl, glm, moe, production]
