version: "1"
name: dynamo-disagg-prefill-nixl-rag
description: Dynamo 1.0 orchestrated disaggregated serving for long-context RAG workloads (32K-128K) with NIXL KV transfer.
engine: dynamo
workload: long-context-kv-offload-rag
benchmark_role: topology_probe
target_gpu_families: [hopper, blackwell, blackwell_ultra, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [dense_gqa, qwen35_hybrid, frontier_mla_moe]
focus_areas: [disaggregation, kv_transfer, rdma, long_context, rag, dynamo]
topology:
  mode: prefill_decode_split
  session_routing: sticky
  session_header_name: X-Session-ID
  request_target_name: primary
  kv_connector: NixlConnector
  notes:
    - "RAG workloads are prefill-dominant: 32K-128K token contexts with short outputs"
    - "Dynamo splits prefill to compute-optimized pool, decode to bandwidth-optimized pool"
    - "NIXL RDMA transfer critical — 128K context KV cache is 10-40GB depending on model and dtype"
cache:
  strategy: nixl
  tiers: [gpu_hbm]
  connector: NixlConnector
  session_affinity: false
  prefix_cache_expected: false
  notes:
    - "RAG sessions typically have minimal prefix reuse between queries"
    - "FP8 KV cache strongly recommended to keep transfer latency under 200ms at 128K context"
    - "Monitor kv_cache_utilization — RAG workloads can exhaust HBM quickly at high concurrency"
metrics_targets:
  - name: primary
    role: primary
    endpoint_source: metrics_endpoint
    expected_engine: vllm
  - name: router
    role: router
    endpoint_source: named_override
    override_key: router
    expected_engine: dynamo
    required: false
  - name: prefill
    role: prefill
    endpoint_source: named_override
    override_key: prefill
    expected_engine: vllm
  - name: decode
    role: decode
    endpoint_source: named_override
    override_key: decode
    expected_engine: vllm
tags: [dynamo, disagg, nixl, rdma, rag, long-context, production]
