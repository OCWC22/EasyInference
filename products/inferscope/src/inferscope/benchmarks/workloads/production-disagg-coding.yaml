version: "1"
name: production-disagg-coding
description: Production-realistic disaggregated serving workload with real code review content. Designed for prefill/decode split benchmarks with LMCache or NIXL KV transfer.
workload_class: coding
benchmark_role: topology_probe
target_gpu_families: [hopper, hopper_grace, blackwell, blackwell_ultra, blackwell_grace, blackwell_ultra_grace]
target_model_classes: [dense_gqa, qwen35_hybrid, frontier_mla_moe, compact_agentic_moe]
focus_areas: [disaggregation, kv_transfer, ttft, prefix_cache, long_context]
concurrency: 4
stream: true
tags:
  - disaggregated
  - ttft
  - prefix-cache
  - production
  - hydration:hydrated
requests:
  # Session 1: Code review with shared prefix (tests prefix cache hit on decode worker)
  - name: code-review-initial
    session_id: review-session-1
    max_tokens: 512
    messages:
      - role: system
        content: |
          You are a senior software engineer conducting a thorough code review.
          Focus on correctness, performance, and security issues.
          Be specific — reference line numbers and suggest concrete fixes.
      - role: user
        content: |
          Review this Python module that implements an async HTTP benchmark runtime:

          ```python
          import asyncio
          import time
          import json
          import math
          from dataclasses import dataclass
          from typing import Any, Literal
          from uuid import uuid4
          import httpx

          @dataclass(slots=True)
          class RequestResult:
              name: str
              session_id: str | None
              status: Literal["ok", "error"]
              started_at: str
              completed_at: str
              elapsed_ms: float
              ttft_ms: float | None
              status_code: int | None
              prompt_tokens: int | None
              completion_tokens: int | None
              total_tokens: int | None
              error: str = ""

          def percentile(values: list[float], p: float) -> float | None:
              if not values:
                  return None
              ordered = sorted(values)
              rank = (len(ordered) - 1) * p
              lower = math.floor(rank)
              upper = math.ceil(rank)
              if lower == upper:
                  return ordered[lower]
              fraction = rank - lower
              return ordered[lower] + (ordered[upper] - ordered[lower]) * fraction

          async def run_request(
              client: httpx.AsyncClient,
              endpoint: str,
              payload: dict[str, Any],
              headers: dict[str, str],
              timeout_seconds: int = 120,
          ) -> RequestResult:
              started_at = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
              started_mono = time.monotonic()
              ttft_ms = None
              generated = []

              try:
                  async with client.stream("POST", endpoint, json=payload, headers=headers) as resp:
                      resp.raise_for_status()
                      async for line in resp.aiter_lines():
                          line = line.strip()
                          if not line or not line.startswith("data:"):
                              continue
                          data = line[5:].strip()
                          if data == "[DONE]":
                              break
                          event = json.loads(data)
                          content = event.get("choices", [{}])[0].get("delta", {}).get("content")
                          if content:
                              if ttft_ms is None:
                                  ttft_ms = (time.monotonic() - started_mono) * 1000
                              generated.append(content)

                  elapsed = (time.monotonic() - started_mono) * 1000
                  return RequestResult(
                      name=payload.get("model", "unknown"),
                      session_id=headers.get("X-Session-ID"),
                      status="ok",
                      started_at=started_at,
                      completed_at=time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                      elapsed_ms=elapsed,
                      ttft_ms=ttft_ms,
                      status_code=resp.status_code,
                      prompt_tokens=None,
                      completion_tokens=len(generated),
                      total_tokens=None,
                  )
              except Exception as exc:
                  elapsed = (time.monotonic() - started_mono) * 1000
                  return RequestResult(
                      name=payload.get("model", "unknown"),
                      session_id=headers.get("X-Session-ID"),
                      status="error",
                      started_at=started_at,
                      completed_at=time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                      elapsed_ms=elapsed,
                      ttft_ms=None,
                      status_code=None,
                      prompt_tokens=None,
                      completion_tokens=None,
                      total_tokens=None,
                      error=str(exc),
                  )

          async def run_benchmark(
              endpoint: str,
              payloads: list[dict[str, Any]],
              concurrency: int = 8,
              headers: dict[str, str] | None = None,
          ) -> list[RequestResult]:
              sem = asyncio.Semaphore(concurrency)
              hdrs = headers or {"Content-Type": "application/json"}

              async def bounded(p):
                  async with sem:
                      async with httpx.AsyncClient(timeout=300) as client:
                          return await run_request(client, endpoint, p, hdrs)

              return await asyncio.gather(*(bounded(p) for p in payloads))
          ```

          Key concerns:
          1. Are there any race conditions or resource leaks?
          2. Is the error handling sufficient for production use?
          3. What happens under high concurrency (1000+ requests)?

  - name: code-review-followup
    session_id: review-session-1
    max_tokens: 512
    messages:
      - role: system
        content: |
          You are a senior software engineer conducting a thorough code review.
          Focus on correctness, performance, and security issues.
          Be specific — reference line numbers and suggest concrete fixes.
      - role: user
        content: |
          Review this Python module that implements an async HTTP benchmark runtime:
          [same code as above — tests prefix cache reuse on the shared system prompt + code block]
      - role: assistant
        content: |
          The code has several issues for production use:
          1. Each request creates a new httpx.AsyncClient — this prevents connection pooling
          2. No backpressure mechanism beyond the semaphore
          3. The SSE parsing is fragile — multi-line data events will be dropped
      - role: user
        content: |
          Good observations. Now produce the minimal diff to fix issue #1 (connection pooling).
          Show the exact code changes needed, nothing else.

  # Session 2: Infrastructure config review (independent session, tests parallel disagg)
  - name: infra-config-review
    session_id: infra-session-1
    max_tokens: 256
    messages:
      - role: system
        content: You are a DevOps engineer reviewing infrastructure configurations for security and reliability.
      - role: user
        content: |
          Review this Kubernetes deployment spec for a vLLM inference server:

          ```yaml
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: vllm-server
            namespace: inference
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: vllm-server
            template:
              metadata:
                labels:
                  app: vllm-server
              spec:
                containers:
                - name: vllm
                  image: vllm/vllm-openai:latest
                  command: ["python", "-m", "vllm.entrypoints.openai.api_server"]
                  args:
                    - "--model"
                    - "meta-llama/Llama-3-70B-Instruct"
                    - "--tensor-parallel-size"
                    - "4"
                    - "--gpu-memory-utilization"
                    - "0.95"
                    - "--max-model-len"
                    - "131072"
                  resources:
                    limits:
                      nvidia.com/gpu: "4"
                    requests:
                      nvidia.com/gpu: "4"
                  ports:
                    - containerPort: 8000
                  readinessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    initialDelaySeconds: 120
                    periodSeconds: 10
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8000
                    initialDelaySeconds: 300
                    periodSeconds: 30
                  volumeMounts:
                    - name: model-cache
                      mountPath: /root/.cache/huggingface
                    - name: shm
                      mountPath: /dev/shm
                volumes:
                  - name: model-cache
                    persistentVolumeClaim:
                      claimName: model-cache-pvc
                  - name: shm
                    emptyDir:
                      medium: Memory
                      sizeLimit: 16Gi
          ```

          What are the top 3 reliability and security concerns?

  # Session 3: Multi-turn debugging (tests session affinity and growing context)
